name: wavy
description: Wavy — Tinder-for-thrift. Swipe, discover, and buy secondhand fashion in Addis Ababa.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.3.1
  firebase_messaging: ^15.2.1
  google_sign_in: ^6.2.1
  cloud_functions: ^5.2.1
  firebase_app_check: ^0.3.1+1
  firebase_analytics: ^11.4.2
  firebase_crashlytics: ^4.3.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.8.1

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # Swipe cards
  flutter_card_swiper: ^7.0.1

  # Utilities
  url_launcher: ^6.3.1
  intl: any
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/mobile app Icons/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/mobile app Icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/images/
    - assets/images/dummy/
    - assets/l10n/
