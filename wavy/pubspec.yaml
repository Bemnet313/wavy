name: wavy
description: Wavy — Tinder-for-thrift. Swipe, discover, and buy secondhand fashion in Addis Ababa.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.8.1

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # Swipe cards
  flutter_card_swiper: ^7.0.1

  # Utilities
  url_launcher: ^6.3.1
  intl: any
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/dummy/
    - assets/l10n/
