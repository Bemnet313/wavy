name: Android Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'
        channel: 'stable'
        cache: true

    - name: Get Dependencies
      run: flutter pub get
      working-directory: wavy

    - name: Decode Keystore
      run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > wavy/android/app/wavy-keystore.jks

    - name: Build APK
      run: flutter build apk --release
      working-directory: wavy
      env:
        ANDROID_KEYSTORE_PATH: "wavy-keystore.jks"
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Upload to Firebase App Distribution
      uses: w3cj/firebase-app-distribution-action@v2
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        token: ${{ secrets.FIREBASE_TOKEN }}
        file: wavy/build/app/outputs/flutter-apk/app-release.apk
        groups: testers
